name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'The type of version bump to apply (major, minor, or patch)'
        required: true
        default: 'patch'
        type: choice
        options:
        - major
        - minor
        - patch
      prerelease:
        description: 'Whether this is a pre-release'
        required: true
        default: false
        type: boolean

jobs:
  test:
    uses: ./.github/workflows/testing.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Update version
        id: version
        uses: Mathieu-Beliveau/rust-version-action@v1
        with:
          version-type: ${{ github.event.inputs.version_type }}
          pre-release: ${{ github.event.inputs.prerelease }}

      - name: Commit and push version change
        run: |
          git add Cargo.toml Cargo.lock || true
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || true
          git push

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ steps.version.outputs.changelog }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "$CHANGELOG" \
            $PRERELEASE_FLAG
